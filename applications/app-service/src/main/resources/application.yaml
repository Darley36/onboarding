server:
  port: 8080
spring:
  application:
    name: "onboarding-nequi"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"
  profiles:
    include: null
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
adapter:
  restconsumer:
    timeout: 5000
    url: "${URL_WEB:https://reqres.in/api/users}"
postgresql:
  host: "${DB_HOST:localhost}"
  port: "${DB_PORT:5432}"
  database: "${DB_NAME:tallernequi}"
  username: "${DB_USER:admin}"
  password: "${DB_PASS:admin}"
  schema: "${DB_SCHEMA:public}"

